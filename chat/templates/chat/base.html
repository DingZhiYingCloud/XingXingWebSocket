<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}XingXing WebSocket{% endblock %}</title>
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --bg-primary: #0b1120;
            --bg-secondary: #131c31;
            --bg-card: #1a2744;
            --bg-card-hover: #1f2f4f;
            --bg-input: #0d1525;
            --border-color: #253354;
            --border-light: #1e2d4a;
            --text-primary: #e8edf5;
            --text-secondary: #94a3b8;
            --text-muted: #5b6f92;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-blue-glow: rgba(59, 130, 246, 0.15);
            --accent-green: #22c55e;
            --accent-green-bg: rgba(34, 197, 94, 0.1);
            --accent-purple: #8b5cf6;
            --accent-purple-bg: rgba(139, 92, 246, 0.1);
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-red-bg: rgba(239, 68, 68, 0.1);
            --gradient-primary: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --gradient-accent: linear-gradient(135deg, #f59e0b, #ef4444);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --sidebar-width: 260px;
        }

        /* ===== Reset ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent-blue); text-decoration: none; transition: color 0.2s; }
        a:hover { color: #93bbfc; }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ===== Header ===== */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-logo {
            width: 32px;
            height: 32px;
            background: var(--gradient-primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 600;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header .nav-link {
            color: var(--text-muted);
            font-size: 13px;
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
            -webkit-text-fill-color: var(--text-muted);
            background: transparent;
        }
        .header .nav-link:hover {
            background: var(--bg-card);
            color: var(--text-primary);
            -webkit-text-fill-color: var(--text-primary);
            text-decoration: none;
        }

        /* ===== Container ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        /* ===== Cards ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            transition: border-color 0.2s;
        }
        .card:hover {
            border-color: var(--border-light);
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }
        .card-title .badge {
            margin-left: auto;
            font-size: 11px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--accent-blue-glow);
            color: var(--accent-blue);
        }

        /* ===== Form Elements ===== */
        input[type="text"], input[type="password"], select, textarea {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: all 0.25s;
            font-family: inherit;
        }
        input[type="text"]:focus, input[type="password"]:focus, select:focus, textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--accent-blue-glow);
        }
        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
            font-size: 13px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 22px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: inherit;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: var(--gradient-primary);
            color: #fff;
        }
        .btn-primary:hover { box-shadow: 0 4px 15px var(--accent-blue-glow); }
        .btn-danger {
            background: var(--gradient-accent);
            color: #fff;
        }
        .btn-danger:hover { box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-success {
            background: var(--accent-green);
            color: #fff;
        }
        .btn-success:hover { background: #16a34a; }
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .btn-ghost:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }
        .btn-sm { padding: 7px 14px; font-size: 13px; }
        .btn-xs { padding: 4px 10px; font-size: 12px; border-radius: 4px; }
        .btn-icon {
            width: 34px; height: 34px;
            padding: 0;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
        }
        .btn-icon:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn:disabled:active { transform: none; }

        /* ===== Messages / Chat Bubbles ===== */
        .messages {
            height: 420px;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: var(--radius-md);
            max-width: 80%;
            word-break: break-word;
            line-height: 1.5;
            font-size: 14px;
            animation: msgIn 0.25s ease-out;
            position: relative;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-user {
            background: linear-gradient(135deg, #1a2d4a, #1e3a5f);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .msg-self {
            background: linear-gradient(135deg, #0f2a1a, #1a3a2a);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg-system {
            background: var(--accent-purple-bg);
            align-self: center;
            text-align: center;
            font-size: 12px;
            color: var(--accent-purple);
            padding: 6px 16px;
            border-radius: 20px;
            max-width: 90%;
            border: 1px solid rgba(139, 92, 246, 0.15);
        }
        .msg-broadcast {
            background: rgba(245, 158, 11, 0.08);
            align-self: center;
            text-align: center;
            font-size: 13px;
            color: var(--accent-orange);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: var(--radius-md);
        }
        .msg-private {
            background: linear-gradient(135deg, #1a2d4a, #1e3a5f);
            border-left: 3px solid var(--accent-orange);
            align-self: flex-start;
        }
        .msg-private-sent {
            background: linear-gradient(135deg, #0f2a1a, #1a3a2a);
            border-right: 3px solid var(--accent-orange);
            align-self: flex-end;
        }

        .msg .msg-author {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 2px;
        }
        .msg .msg-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: right;
            opacity: 0.7;
        }
        .msg-self .msg-author { color: var(--accent-green); }

        /* ===== Input Area ===== */
        .input-area {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .input-area input { flex: 1; }

        /* ===== User List ===== */
        .user-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .user-list li {
            padding: 9px 12px;
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }
        .user-list li:hover {
            background: var(--bg-card-hover);
        }
        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }
        .user-avatar.green { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .user-avatar.purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .user-avatar.orange { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .user-avatar.pink { background: linear-gradient(135deg, #ec4899, #db2777); }
        .user-avatar.teal { background: linear-gradient(135deg, #14b8a6, #0d9488); }

        .user-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
        }
        .user-status {
            font-size: 10px;
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .user-status::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 0 6px var(--accent-green);
        }
        .user-status.offline {
            color: var(--text-muted);
        }
        .user-status.offline::before {
            background: var(--text-muted);
            box-shadow: none;
        }
        .user-list .empty-state {
            color: var(--text-muted);
            font-size: 13px;
            justify-content: center;
            padding: 20px;
            background: transparent;
        }

        /* ===== Connection Status ===== */
        .connection-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }
        .connection-badge.connected {
            color: var(--accent-green);
            border-color: rgba(34, 197, 94, 0.3);
            background: var(--accent-green-bg);
        }
        .connection-badge.connecting {
            color: var(--accent-orange);
            border-color: rgba(245, 158, 11, 0.3);
            background: rgba(245, 158, 11, 0.08);
        }
        .connection-badge.disconnected {
            color: var(--accent-red);
            border-color: rgba(239, 68, 68, 0.3);
            background: var(--accent-red-bg);
        }

        /* ===== Layout Utilities ===== */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .flex-wrap { flex-wrap: wrap; }
        .gap-sm { gap: 8px; }
        .gap-md { gap: 16px; }
        .gap-lg { gap: 24px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .flex-1 { flex: 1; }
        .text-center { text-align: center; }
        .text-muted { color: var(--text-muted); }
        .text-sm { font-size: 13px; }
        .mt-sm { margin-top: 8px; }
        .mt-md { margin-top: 16px; }
        .mt-lg { margin-top: 24px; }
        .mb-sm { margin-bottom: 8px; }
        .mb-md { margin-bottom: 16px; }
        .w-full { width: 100%; }

        /* ===== Sidebar Layout ===== */
        .chat-layout {
            display: flex;
            gap: 16px;
            min-height: calc(100vh - 96px);
        }
        .chat-sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
        }
        .chat-main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        /* ===== Responsive ===== */
        @media (max-width: 900px) {
            :root { --sidebar-width: 100%; }
            .chat-layout { flex-direction: column; }
            .chat-sidebar { width: 100%; }
            .container { padding: 12px; }
            .header { padding: 0 16px; }
            .msg { max-width: 92%; }
        }

        /* ===== Animations ===== */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse { animation: pulse 2s ease-in-out infinite; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="header-logo">X</div>
            <h1>XingXing WebSocket</h1>
        </div>
        <div class="header-right">
            <a href="{% url 'chat:index' %}" class="nav-link">首页</a>
        </div>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
