<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}XingXing WebSocket 聊天室{% endblock %}</title>
    <style>
        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ===== 头部导航 ===== */
        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header .nav-links { display: flex; gap: 12px; font-size: 14px; }
        .header .nav-links a {
            color: #94a3b8;
            padding: 4px 12px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .header .nav-links a:hover {
            background: #334155;
            color: #e2e8f0;
            text-decoration: none;
        }

        /* ===== 主容器 ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ===== 通用组件 ===== */
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="text"], input[type="password"], select {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px 14px;
            color: #e2e8f0;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus, select:focus {
            border-color: #60a5fa;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        .btn-danger:hover { background: #dc2626; }
        .btn-success {
            background: #22c55e;
            color: #fff;
        }
        .btn-success:hover { background: #16a34a; }
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* ===== 消息气泡 ===== */
        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 12px;
            background: #0f172a;
            border-radius: 6px;
            border: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: #0f172a; }
        .messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        .msg {
            padding: 8px 12px;
            border-radius: 6px;
            max-width: 85%;
            word-break: break-word;
            line-height: 1.5;
            font-size: 14px;
        }
        .msg-user { background: #1e3a5f; align-self: flex-start; }
        .msg-self { background: #1a3a2a; align-self: flex-end; }
        .msg-system { background: #2d1b4e; align-self: center; text-align: center; font-size: 13px; color: #a78bfa; }
        .msg-broadcast { background: #3b1f3b; align-self: center; text-align: center; border: 1px solid #7c3aed; font-size: 13px; color: #c084fc; }
        .msg-private { background: #1e3a5f; border-left: 3px solid #f59e0b; align-self: flex-start; }
        .msg-private-sent { background: #1a3a2a; border-right: 3px solid #f59e0b; align-self: flex-end; }

        .msg .msg-author { font-size: 12px; font-weight: 600; color: #60a5fa; margin-bottom: 2px; }
        .msg .msg-time { font-size: 11px; color: #64748b; margin-top: 2px; text-align: right; }

        /* ===== 消息输入区 ===== */
        .input-area {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .input-area input { flex: 1; }

        /* ===== 用户列表 ===== */
        .user-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .user-list li {
            padding: 8px 12px;
            background: #0f172a;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-status { font-size: 12px; color: #22c55e; }
        .user-status.offline { color: #64748b; }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .header { padding: 12px 16px; flex-direction: column; gap: 8px; }
            .msg { max-width: 95%; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="header">
        <h1>🔗 XingXing WebSocket</h1>
        <div class="nav-links">
            <a href="{% url 'chat:index' %}">🏠 首页</a>
        </div>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
