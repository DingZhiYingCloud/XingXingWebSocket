{% extends "chat/base.html" %}
{% load static %}

{% block title %}房间 {{ room_name }}{% endblock %}

{% block content %}
<div class="chat-layout">
    {# ===== 左侧：在线用户列表 ===== #}
    <div class="chat-sidebar">
        <div class="card" style="height: 100%; display: flex; flex-direction: column;">
            <div class="card-title">
                👥 在线用户
                <span class="badge" id="userCount">0</span>
            </div>
            <ul id="userList" class="user-list" style="flex: 1;">
                <li class="empty-state">等待连接...</li>
            </ul>
            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color);">
                <div class="text-sm text-muted">房间：{{ room_name }}</div>
            </div>
        </div>
    </div>

    {# ===== 右侧：聊天主区域 ===== #}
    <div class="chat-main">
        <div class="card" style="flex: 1; display: flex; flex-direction: column;">
            <div class="card-title">
                💬 聊天
                <span id="connectionStatus" class="connection-badge connecting" style="margin-left: auto;">
                    <span class="pulse">●</span> 连接中...
                </span>
            </div>
            <div id="messages" class="messages" style="flex: 1; min-height: 350px;"></div>
            <div class="input-area">
                <input type="text" id="chatInput" placeholder="输入消息..." autofocus disabled>
                <button id="sendBtn" class="btn btn-primary btn-sm" disabled>发送</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    (function() {
        const roomName = "{{ room_name|escapejs }}";
        const params = new URLSearchParams(window.location.search);
        const username = params.get('username') || '匿名用户';

        // DOM 元素
        const messagesEl = document.getElementById('messages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('connectionStatus');
        const userListEl = document.getElementById('userList');
        const userCountEl = document.getElementById('userCount');

        // WebSocket
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const wsUrl = `${protocol}${window.location.host}/ws/chat/${roomName}/?username=${encodeURIComponent(username)}`;
        let ws = null;
        let reconnectTimer = null;
        let userAvatars = {}; // 缓存用户头像颜色
        let lastUserList = [];

        // 头像颜色列表
        const avatarColors = ['blue', 'green', 'purple', 'orange', 'pink', 'teal'];

        function getAvatarColor(name) {
            if (userAvatars[name]) return userAvatars[name];
            const idx = Math.abs(hashStr(name)) % avatarColors.length;
            userAvatars[name] = avatarColors[idx];
            return userAvatars[name];
        }

        function hashStr(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash |= 0;
            }
            return hash;
        }

        function getInitials(name) {
            return name.charAt(0).toUpperCase();
        }

        // ========== WebSocket ==========
        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            setStatus('connecting', '连接中...');

            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                setStatus('connected', '已连接');
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
            };

            ws.onclose = function() {
                setStatus('disconnected', '已断开，重连中...');
                chatInput.disabled = true;
                sendBtn.disabled = true;
                scheduleReconnect();
            };

            ws.onerror = function() {
                setStatus('disconnected', '连接错误');
            };

            ws.onmessage = function(e) {
                try {
                    const data = JSON.parse(e.data);
                    handleMessage(data);
                } catch (err) {
                    console.error('消息解析失败:', err);
                }
            };
        }

        function setStatus(state, text) {
            statusEl.className = `connection-badge ${state}`;
            statusEl.innerHTML = `● ${text}`;
        }

        function scheduleReconnect() {
            if (reconnectTimer) clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(connect, 3000);
        }

        function sendJson(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            }
        }

        // ========== 消息处理 ==========
        function handleMessage(data) {
            const type = data.type;

            if (type === 'chat.message') {
                const isSelf = data.username === username;
                appendMessage(data.text, data.username, data.timestamp,
                    isSelf ? 'msg-self' : 'msg-user');
            } else if (type === 'script.broadcast') {
                appendMessage(data.text, '系统广播', data.timestamp, 'msg-broadcast');
            } else if (type === 'system.info') {
                appendMessage(data.text, '', '', 'msg-system');
            } else if (type === 'script.private') {
                const isSentTo = data.from.startsWith('→ ');
                if (isSentTo) {
                    appendMessage(data.text, data.from, data.timestamp, 'msg-private-sent');
                } else {
                    appendMessage(data.text, data.from, data.timestamp, 'msg-private');
                }
            } else if (type === 'script.user_list') {
                renderUserList(data.users || []);
            }
        }

        function appendMessage(text, author, timestamp, className) {
            const div = document.createElement('div');
            div.className = `msg ${className}`.trim();

            let html = '';
            if (author) {
                html += `<div class="msg-author">${escapeHtml(author)}</div>`;
            }
            html += `<div>${escapeHtml(text)}</div>`;
            if (timestamp) {
                html += `<div class="msg-time">${timestamp}</div>`;
            }
            div.innerHTML = html;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // ========== 用户列表 ==========
        function renderUserList(users) {
            lastUserList = users;

            if (!users || users.length === 0) {
                userListEl.innerHTML = '<li class="empty-state">暂无其他用户</li>';
                userCountEl.textContent = '0';
                return;
            }

            userCountEl.textContent = users.length;

            userListEl.innerHTML = users.map(u => {
                const name = u.username;
                const initial = getInitials(name);
                const color = getAvatarColor(name);
                const isSelf = name === username;
                return `
                    <li>
                        <div class="user-avatar ${color}">${initial}</div>
                        <span class="user-name">${escapeHtml(name)}${isSelf ? ' <span style="color:var(--text-muted);font-size:11px;">(你)</span>' : ''}</span>
                        <span class="user-status"></span>
                    </li>
                `;
            }).join('');
        }

        // ========== 发送消息 ==========
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

            sendJson({ type: 'chat.message', text: text });
            chatInput.value = '';
            chatInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== 启动 ==========
        connect();
    })();
</script>
{% endblock %}
